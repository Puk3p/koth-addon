name: Build

on:
  workflow_dispatch:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Verify & Package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: "Step 1: Validate"
        run: mvn validate --batch-mode --no-transfer-progress

      - name: "Step 2: Compile"
        run: mvn clean compile --batch-mode --no-transfer-progress

      - name: "Step 3: Package"
        run: mvn package -DskipTests --batch-mode --no-transfer-progress

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: FKothWins
          path: |
            target/fkoth-wins-*.jar
            !target/original-*.jar
          if-no-files-found: error
